# 256px imagewoof run on a 12GB GPU (RTX 3060). Verified: bs 32 used only 5.4GB
# at ~120 img/s, so bs 64 fits with headroom. Baseline (GAN/LPIPS/VFM off) --
# watch cb_use (codebook usage); if it stays <0.1 after ~2k steps, flip
# vfm.enabled or raise entropy_weight (run-2 levers).
#
# Why these choices fit 12GB:
#   - captions are CACHED (Qwen runs once, then is NOT resident in training VRAM)
#   - patch_size 16 -> 16x16 = 256 patch tokens (keeps attention cost sane; a
#     patch_size 8 would be 1024 tokens => 16x attention and would blow the card)
#   - GAN / LPIPS / VFM all OFF (RAM-safe baseline; flip VFM on for run-2)
#
# Run:
#   python -m imagegen.cli.train --config configs/imagewoof_256.yaml
run_name: imagegen-imagewoof-256
seed: 42
device: auto    # cuda on the box
amp: auto       # bf16 autocast on cuda

data:
  dataset: hf_image_caption
  hf_name: tachytelicdetonation/imagewoof-gemma4-31b-captions-multires
  hf_config: 320px        # source >= target; loader resizes/crops to 256
  train_split: train
  val_split: validation
  image_column: image
  caption_column: caption
  image_size: 256
  channels: 3
  batch_size: 64          # 12GB headroom: bs 32 used 5.4GB, bs 64 ~9-10GB
  num_workers: 8          # 12 cores on the box; keep the GPU fed

text:
  model_name: Qwen/Qwen3.5-0.8B
  max_length: 128
  freeze: true
  trust_remote_code: false
  save_encoder_state: false
  cache_dataset: true     # one-time Qwen pass -> disk; Qwen not in training VRAM
  cache_dir: data/text_cache
  cache_batch_size: 64
  cache_dtype: float16

tokenizer:
  patch_size: 16          # 256/16 -> 16x16 = 256 patch tokens
  hidden_dim: 384
  enc_layers: 6
  dec_layers: 6
  num_heads: 6
  num_latent_tokens: 32
  latent_dim: 32

quantizer:
  codebook_size: 1024
  temperature: 1.0
  commit_weight: 1.0e-3
  entropy_weight: 0.01

ar:
  layers: 8
  hidden_dim: 384
  num_heads: 6
  condition_dropout: 0.1

vfm:
  enabled: false

loss:
  recon_l2: 1.0
  recon_lpips: 0.0
  gan: 0.0
  lecam: 0.05
  apr_l2: 1.0
  apr_lpips: 0.0
  ntp: 0.1
  disc_start: 2000
  lpips_enabled: false

train:
  epochs: 200
  lr: 1.0e-4
  min_lr: 1.0e-6
  beta1: 0.9
  beta2_tokenizer: 0.999
  beta2_ar: 0.95
  ema_decay: 0.999
  nested_dropout: 0.5
  warmup_ratio: 0.03
  grad_clip: 1.0
  log_every: 50
  sample_every: 500       # ~every 3-4 min at bs 64
  ckpt_every: 1000
  out_dir: runs/imagewoof_256
