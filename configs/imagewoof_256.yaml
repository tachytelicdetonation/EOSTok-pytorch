# 256px imagewoof run on a 12GB GPU (RTX 3060). Baseline (GAN/LPIPS/VFM off).
#
# CRITICAL: num_latent_tokens must NOT be 32 at 256px. EOSTok paper (2605.00503)
# Table 5 ablates sequence length at 256x256: L=32 -> rFID 17.50 (mean-color
# collapse), L=128 -> rFID 1.32 / gFID 3.09 (best gFID), L=256 -> rFID 1.02. The
# paper default is 256; we use 128 (best gFID, cheaper). latent_dim=64 matches
# the paper's d=64. An earlier run with L=32 produced flat mean-color recons --
# that was this, not a codebook/EMA bug.
#
# Why these choices fit 12GB:
#   - captions are CACHED (Qwen runs once, then is NOT resident in training VRAM)
#   - patch_size 16 -> 16x16 = 256 patch tokens (keeps attention cost sane; a
#     patch_size 8 would be 1024 tokens => 16x attention and would blow the card)
#   - GAN / LPIPS / VFM all OFF (RAM-safe baseline; flip VFM on for run-2)
#
# Run:
#   python -m imagegen.cli.train --config configs/imagewoof_256.yaml
run_name: imagegen-imagewoof-256
seed: 42
device: auto    # cuda on the box
amp: auto       # bf16 autocast on cuda

data:
  dataset: hf_image_caption
  hf_name: tachytelicdetonation/imagewoof-gemma4-31b-captions-multires
  hf_config: 320px        # source >= target; loader resizes/crops to 256
  train_split: train
  val_split: validation
  image_column: image
  caption_column: caption
  image_size: 256
  channels: 3
  batch_size: 32          # L=128 is 4x the latent seq; bs 32 keeps VRAM in budget
  num_workers: 8          # 12 cores on the box; keep the GPU fed

text:
  model_name: Qwen/Qwen3.5-0.8B
  max_length: 128
  freeze: true
  trust_remote_code: false
  save_encoder_state: false
  cache_dataset: true     # one-time Qwen pass -> disk; Qwen not in training VRAM
  cache_dir: data/text_cache
  cache_batch_size: 64
  cache_dtype: float16

tokenizer:
  patch_size: 16          # 256/16 -> 16x16 = 256 patch tokens
  hidden_dim: 384
  enc_layers: 6
  dec_layers: 6
  num_heads: 6
  num_latent_tokens: 128  # paper Table 5: 32 collapses to mean-color at 256px
  latent_dim: 64          # paper d=64

quantizer:
  codebook_size: 1024
  temperature: 1.0
  commit_weight: 1.0e-3
  entropy_weight: 0.01

ar:
  layers: 8
  hidden_dim: 384
  num_heads: 6
  condition_dropout: 0.1

vfm:
  enabled: false

loss:
  # Paper Table 9 recipe. L2-only collapses a discrete tokenizer to mean color;
  # LPIPS is the perceptual gradient that forces structure (and lifts cb_use).
  recon_l2: 1.0
  recon_lpips: 1.0       # paper 1.0 (was 0 -> mean-color collapse)
  gan: 0.1               # paper 0.1; kicks in at disc_start
  lecam: 0.05
  apr_l2: 1.0
  apr_lpips: 1.0         # paper 1.0
  ntp: 0.1
  disc_start: 2000
  lpips_enabled: true    # paper trains with LPIPS always; only VFM still off

train:
  epochs: 200
  lr: 1.0e-4
  min_lr: 1.0e-6
  beta1: 0.9
  beta2_tokenizer: 0.999
  beta2_ar: 0.95
  ema_decay: 0.99        # paper 0.9999; lowered for faster sample visibility while diagnosing
  nested_dropout: 0.5
  warmup_ratio: 0.03
  grad_clip: 1.0
  log_every: 50
  sample_every: 500       # ~every 3-4 min at bs 64
  ckpt_every: 1000
  out_dir: runs/imagewoof_256
