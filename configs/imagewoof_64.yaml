# Caption-conditioned ImageGen default for:
# tachytelicdetonation/imagewoof-gemma4-31b-captions-multires
#
# This keeps an EOSTok-style joint tokenizer + AR + APR recipe and conditions
# it with a frozen Qwen text prefix at 64x64.

run_name: imagegen-imagewoof-64
seed: 42
device: auto
amp: auto

data:
  dataset: hf_image_caption
  hf_name: tachytelicdetonation/imagewoof-gemma4-31b-captions-multires
  hf_config: 160px
  train_split: train
  val_split: validation
  image_column: image
  caption_column: caption
  image_size: 64
  channels: 3
  batch_size: 64
  num_workers: 2

text:
  model_name: Qwen/Qwen3.5-0.8B
  max_length: 128
  freeze: true
  trust_remote_code: false
  save_encoder_state: false
  cache_dataset: true
  cache_dir: data/text_cache
  cache_batch_size: 64
  cache_dtype: float16

tokenizer:
  patch_size: 8           # 8x8 = 64 patch tokens
  hidden_dim: 384
  enc_layers: 6
  dec_layers: 6
  num_heads: 6
  num_latent_tokens: 32
  latent_dim: 32

quantizer:
  codebook_size: 1024
  temperature: 1.0
  commit_weight: 1.0e-3
  entropy_weight: 0.01

ar:
  layers: 8
  hidden_dim: 384
  num_heads: 6
  condition_dropout: 0.1

vfm:
  enabled: false

loss:
  recon_l2: 1.0
  recon_lpips: 0.0
  gan: 0.0
  lecam: 0.05
  apr_l2: 1.0
  apr_lpips: 0.0
  ntp: 0.1
  disc_start: 2000
  lpips_enabled: false

train:
  epochs: 20
  lr: 1.0e-4
  min_lr: 1.0e-6
  beta1: 0.9
  beta2_tokenizer: 0.999
  beta2_ar: 0.95
  ema_decay: 0.999
  nested_dropout: 0.5
  grad_clip: 1.0
  log_every: 50
  sample_every: 1000
  ckpt_every: 2000
  out_dir: runs/imagewoof_64
