# EOSTok on MNIST -- a smoke-scale config that runs on a MacBook (MPS) or CPU.
# Same single-stage end-to-end pipeline as the paper, scaled down ~100x.
# VFM alignment is off: DINOv2 features are not meaningful for 32px grayscale
# digits. Flip vfm.enabled to true to exercise that code path anyway.

run_name: eostok-mnist
seed: 42
device: auto
amp: auto

data:
  dataset: mnist
  root: ./data
  image_size: 32
  channels: 1
  num_classes: 10
  batch_size: 128
  num_workers: 2

tokenizer:
  patch_size: 4        # 8x8 = 64 patch tokens
  hidden_dim: 256
  enc_layers: 4
  dec_layers: 4
  num_heads: 4
  num_latent_tokens: 16   # L
  latent_dim: 16          # d

quantizer:
  codebook_size: 512      # K
  temperature: 1.0
  commit_weight: 1.0e-3
  entropy_weight: 0.01

ar:
  layers: 4
  hidden_dim: 256
  num_heads: 4
  class_dropout: 0.1

vfm:
  enabled: false

loss:
  recon_l2: 1.0
  recon_lpips: 1.0
  gan: 0.1
  lecam: 0.05
  apr_l2: 1.0
  apr_lpips: 1.0
  ntp: 0.1
  disc_start: 2000        # demo tuning: let reconstruction stabilize before
                          # the GAN kicks in (paper uses 0 at ImageNet scale).

train:
  epochs: 20              # demo-scale (~9.4k steps); paper trains 400 epochs.
  lr: 1.0e-4
  min_lr: 1.0e-6
  beta1: 0.9
  beta2_tokenizer: 0.999
  beta2_ar: 0.95
  ema_decay: 0.999        # demo tuning: shorter runs want a faster EMA than
                          # the paper's 0.9999. The ImageNet configs use 0.9999.
  nested_dropout: 0.5
  grad_clip: 1.0
  log_every: 50
  sample_every: 1000
  ckpt_every: 2000
  out_dir: runs/mnist
